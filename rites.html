<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Congratulations Marife Ignacio Tomale Masteral Graduate</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(-45deg, #d9eaf7, #e5e5e5, #b7d8f5, #eef7ff);
      background-size: 400% 400%;
      animation: gradientMove 10s ease infinite;
      text-align: center;
      color: #333;
      overflow-x: hidden;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container { padding: 30px; }

    h1 {
      font-family: 'Great Vibes', cursive;
      color: #4a6fa5;
      font-size: 4em;
      margin-bottom: 10px;
      text-shadow: 2px 2px 8px rgba(255,255,255,0.8);
    }

    h2 {
      color: #6b8fb3;
      font-size: 2em;
    }

    .gallery {
      display: flex;
      justify-content: center;
      gap: 25px;
      flex-wrap: wrap;
      margin: 30px 0;
    }

    .photo-card {
      padding: 10px;
      background: rgba(255,255,255,0.6);
      border-radius: 25px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      transition: transform 0.4s ease;
      animation: float 3s ease-in-out infinite;
    }

    .photo-card:hover {
      transform: scale(1.08) rotate(2deg);
    }

    .photo-card img {
      width: 250px;
      height: 300px;
      object-fit: cover;
      border-radius: 20px;
      border: 5px solid white;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .message {
      background: rgba(255,255,255,0.85);
      margin: auto;
      max-width: 700px;
      padding: 25px;
      border-radius: 20px;
      font-size: 1.2em;
      line-height: 1.6;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }
 button {
      margin: 15px;
      padding: 15px 30px;
      border: none;
      border-radius: 30px;
      background: #6b8fb3;
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #4a6fa5;
      transform: scale(1.05);
    }

    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      background: #6b8fb3;
      top: -10px;
      animation: fall 5s linear infinite;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="confetti" style="left:10%; animation-delay:0s;"></div>
  <div class="confetti" style="left:30%; animation-delay:1s;"></div>
  <div class="confetti" style="left:50%; animation-delay:2s;"></div>
  <div class="confetti" style="left:70%; animation-delay:3s;"></div>
  <div class="confetti" style="left:90%; animation-delay:4s;"></div>

  <div class="container">
    <h1>🎓 Congratulations Marife Ignacio Tomale! 🎓</h1>
    <h2>Masteral Graduate</h2>

    <div class="gallery">
      <div class="photo-card"><img src="pics.jpg.jpg" alt="Picture 1"></div>
      <div class="photo-card"><img src="pics2.jpg.jpg" alt="Picture 2"></div>
      <div class="photo-card"><img src="pics3.jpg.jpg" alt="Picture 3"></div>
    </div>

    <div class="message">
      Your hard work, dedication, and perseverance have finally paid off.<br>
      Congratulations on your Masteral Graduation!<br><br>
      Wishing you more success and blessings in your next journey. 💙
    </div>

    <button onclick="showMessage()">Click Me</button>
    <button onclick="playMusic()">▶ Play Congratulations Music</button>

    <audio id="gradMusic">
      <source src="music.mp4.mp4" type="audio/mp4">
    </audio>
  </div>

  <script>
    function showMessage() {
      alert('Congratulations on your Masteral Graduation! We are so proud of you! 🎉');
    }

    function playMusic() {
      const music = document.getElementById('gradMusic');
      music.play();
    }
  </script>
</body>
</html>
